<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKF Trust Metadata</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 8px;
    }
    .tab {
      background: none;
      border: none;
      color: #64748b;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
    }
    .tab.active {
      background: #1e293b;
      color: #e2e8f0;
    }
    .tab:hover { color: #cbd5e1; }
    #content { min-height: 200px; }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" data-view="overview">Overview</button>
    <button class="tab" data-view="claims">Claims</button>
    <button class="tab" data-view="provenance">Provenance</button>
    <button class="tab" data-view="audit">Audit</button>
  </div>
  <div id="content"></div>
  <script src="taskpane.js"></script>
</body>
</html>
