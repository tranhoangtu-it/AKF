name: 'AKF Certify'
description: 'Certify files meet AKF trust standards — trust scoring, detection, and compliance in one step'
inputs:
  paths:
    description: 'File or directory to certify'
    required: false
    default: '.'
  min-trust:
    description: 'Minimum trust score to certify (0.0–1.0)'
    required: false
    default: '0.7'
  fail-on-untrusted:
    description: 'Fail the workflow if any file is not certified'
    required: false
    default: 'true'
  evidence-file:
    description: 'Path to JUnit XML or JSON evidence file'
    required: false
    default: ''
  format:
    description: 'Output format: summary, json, markdown'
    required: false
    default: 'markdown'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  post-comment:
    description: 'Post certification results as a PR comment'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install AKF
      shell: bash
      run: pip install akf

    - name: Run AKF Certify
      id: certify
      shell: bash
      run: |
        set +e
        ARGS="--format ${{ inputs.format }} --min-trust ${{ inputs.min-trust }}"
        if [ "${{ inputs.fail-on-untrusted }}" = "true" ]; then
          ARGS="$ARGS --fail-on-untrusted"
        fi
        if [ -n "${{ inputs.evidence-file }}" ]; then
          ARGS="$ARGS --evidence-file ${{ inputs.evidence-file }}"
        fi

        OUTPUT=$(akf certify ${{ inputs.paths }} $ARGS 2>&1)
        EXIT_CODE=$?

        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

        # Save output for PR comment
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "output<<$EOF" >> "$GITHUB_OUTPUT"
        echo "$OUTPUT" >> "$GITHUB_OUTPUT"
        echo "$EOF" >> "$GITHUB_OUTPUT"

        echo "$OUTPUT"

    - name: Post PR comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const marker = '<!-- akf-certify-report -->';
          const output = `${{ steps.certify.outputs.output }}`;
          const exitCode = '${{ steps.certify.outputs.exit_code }}';
          const status = exitCode === '0' ? '✅ Certified' : '❌ Certification Failed';

          const body = [
            marker,
            `## AKF Trust Certification — ${status}`,
            '',
            output,
            '',
            `> Generated by [AKF Certify](https://akf.dev)`,
          ].join('\n');

          // Update existing comment or create new one
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Check result
      if: inputs.fail-on-untrusted == 'true'
      shell: bash
      run: exit ${{ steps.certify.outputs.exit_code }}

branding:
  icon: 'shield'
  color: 'blue'
