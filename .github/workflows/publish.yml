name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Run tests first ──────────────────────────────────────────────
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          cd python
          pip install -e ".[all,dev]"
          pytest --tb=short -q

  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd typescript
          npm install
          npm test

  # ── Publish Python to PyPI ───────────────────────────────────────
  publish-python:
    needs: [test-python, test-typescript]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read   # checkout private repo
      id-token: write  # for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: |
          cd python
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          # Uses OIDC trusted publishing by default.
          # Fallback: set PYPI_API_TOKEN secret and uncomment below:
          # password: ${{ secrets.PYPI_API_TOKEN }}

  # ── Publish TypeScript to npm ────────────────────────────────────
  publish-typescript:
    needs: [test-python, test-typescript]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read   # checkout private repo
      id-token: write  # for npm trusted publishing (OIDC provenance)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build package
        run: |
          cd typescript
          npm install
          npm run build

      - name: Publish to npm with provenance
        run: |
          cd typescript
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Create GitHub Release ────────────────────────────────────────
  github-release:
    needs: [publish-python, publish-typescript]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
