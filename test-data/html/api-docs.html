<h2>POST /api/v1/validate</h2>
<p>Validates an AKF unit and returns compliance results.</p>
<pre><code>
curl -X POST https://api.akf.dev/v1/validate \
  -H "Content-Type: application/json" \
  -d @unit.akf
</code></pre>
<h2>GET /api/v1/audit/{id}</h2>
<p>Returns audit results for a specific AKF unit.</p>
